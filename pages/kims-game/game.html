<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kim’s Game</title>

  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/kims-game.css" />

  <script src="../../js/question-generator.js" defer></script>
  <script src="game.js" defer></script>
</head>
<body class="kims-page kims-game-page">
  <main class="kims-game">
    <header class="kims-game-header">
      <nav class="kims-header-links" aria-label="Game navigation">
        <a class="kims-back-link" href="../../index.html">← Games</a>
        <a class="kims-back-link" href="settings.html">Settings</a>
      </nav>

      <h1>Kim’s Game</h1>

      <div id="timerDisplay" class="timer-display" aria-live="polite"></div>
    </header>

    <section
      id="cardTable"
      class="card-table"
      aria-label="Kim’s Game cards"
    ></section>

    <footer class="kims-game-controls">
      <button
        id="continueButton"
        class="kims-primary-button"
        type="button"
      >
        Hide Answers
      </button>

      <button
        id="showAnswersAgainButton"
        class="kims-secondary-button hidden"
        type="button"
      >
        Show Answers Again
      </button>

      <button
        id="revealAllButton"
        class="kims-secondary-button hidden"
        type="button"
      >
        Reveal All
      </button>

      <button
        id="newRoundButton"
        class="kims-secondary-button"
        type="button"
      >
        New Round
      </button>
    </footer>

    <div
      id="gameMessage"
      class="kims-game-message hidden"
      role="alert"
    ></div>
  </main>
</body>
</html>
