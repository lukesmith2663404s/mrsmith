<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Pairs Settings</title>

  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pairs.css" />

  <script
    src="../../js/pairs-generator.js"
    defer
  ></script>

  <script src="settings.js" defer></script>
</head>
<body class="pairs-page">
  <main class="pairs-settings-wrapper">
    <section class="pairs-settings-card">
      <a
        class="pairs-back-link"
        href="../../index.html"
      >
        ← Back to games
      </a>

      <h1>Pairs</h1>

      <p class="pairs-intro">
        Turn over two cards at a time and find all the
        matching pairs.
      </p>

      <form id="pairsSettingsForm">
        <label>
          Number of pairs

          <input
            id="pairCount"
            name="pairCount"
            type="number"
            min="2"
            max="27"
            value="8"
          />
        </label>

        <label>
          Mode

          <select id="mode" name="mode"></select>
        </label>

        <label>
          Difficulty

          <select
            id="difficulty"
            name="difficulty"
          ></select>
        </label>

        <p
          id="modeDescription"
          class="mode-description"
        ></p>

        <label>
          Number of players or teams

          <select
            id="playerCount"
            name="playerCount"
          >
            <option value="1" selected>
              1 player
            </option>

            <option value="2">2 teams</option>
            <option value="3">3 teams</option>
            <option value="4">4 teams</option>
            <option value="5">5 teams</option>
            <option value="6">6 teams</option>
            <option value="7">7 teams</option>
            <option value="8">8 teams</option>
          </select>
        </label>

        <p
          id="settingsError"
          class="pairs-error"
          aria-live="polite"
        ></p>

        <button
          class="pairs-primary-button"
          type="submit"
        >
          Start Game
        </button>
      </form>
    </section>
  </main>
</body>
</html>
