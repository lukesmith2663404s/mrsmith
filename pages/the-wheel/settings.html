<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>The Wheel Settings</title>

  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/the-wheel.css" />

<script src="../../js/question-generator.js"></script>
<script src="settings.js" defer></script>
</head>

<body class="wheel-page">
  <main class="wheel-settings-wrapper">
    <section class="wheel-settings-card">
      <a
        class="wheel-back-link"
        href="../../index.html"
      >
        ← Back to games
      </a>

      <h1>The Wheel</h1>

      <p class="wheel-intro">
        Answer a question correctly, then spin the wheel
        to change your score. Later rounds become more
        rewarding, but also more dangerous.
      </p>

      <form id="wheelSettingsForm">
        <section class="wheel-basic-settings">
          <label>
            Number of rounds

            <input
              id="roundCount"
              name="roundCount"
              type="number"
              min="1"
              max="20"
              value="6"
            />
          </label>

          <label>
            Number of players or teams

            <select
              id="playerCount"
              name="playerCount"
            >
              <option value="1" selected>
                1 player
              </option>

              <option value="2">2 teams</option>
              <option value="3">3 teams</option>
              <option value="4">4 teams</option>
              <option value="5">5 teams</option>
              <option value="6">6 teams</option>
              <option value="7">7 teams</option>
              <option value="8">8 teams</option>
            </select>
          </label>
        </section>

        <section class="wheel-topic-section">
          <div class="wheel-topic-heading">
            <div>
              <h2>Question topics</h2>

              <p>
                Select one or more question types to use.
              </p>
            </div>

            <div class="wheel-selection-shortcuts">
              <button
                id="selectAllButton"
                type="button"
              >
                Select all
              </button>

              <button
                id="clearAllButton"
                type="button"
              >
                Clear all
              </button>
            </div>
          </div>

          <div
            id="questionTypeChecklist"
            class="wheel-question-checklist"
          ></div>
        </section>

        <p
          id="settingsError"
          class="wheel-settings-error"
          aria-live="polite"
        ></p>

        <button
          class="wheel-primary-button"
          type="submit"
        >
          Start Game
        </button>
      </form>
    </section>
  </main>
</body>
</html>
