<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Maths Mini Games</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />

  <script src="js/main.js" defer></script>
</head>

<body>
  <main
    class="game-grid"
    aria-label="Classroom tools menu"
  >
    <a
      class="game-tile active haunted-tile"
      href="pages/haunted-calculator/settings.html"
      data-ghost-hover
    >
      <img
        class="tile-ghost-preview"
        src=""
        alt=""
        aria-hidden="true"
      />

      <h2>Haunted Calculator</h2>
    </a>

    <a
      class="game-tile active treasure-tile"
      href="pages/treasure-tracker/settings.html"
    >
      <svg
        class="tile-map-path"
        viewBox="0 0 320 220"
        aria-hidden="true"
        focusable="false"
      >
        <defs>
          <mask id="treasure-route-reveal-mask">
            <path
              class="tile-map-path-reveal"
              pathLength="100"
              d="M18 178 C48 96, 86 196, 126 116 C162 42, 204 52, 230 96 C258 146, 288 116, 306 42"
            />
          </mask>
        </defs>

        <path
          class="tile-map-path-dashes"
          pathLength="100"
          mask="url(#treasure-route-reveal-mask)"
          d="M18 178 C48 96, 86 196, 126 116 C162 42, 204 52, 230 96 C258 146, 288 116, 306 42"
        />
      </svg>

      <h2>Treasure Tracker</h2>
    </a>

    <a
      class="game-tile active card-table-tile kims-tile"
      href="pages/kims-game/settings.html"
    >
      <div
        class="tile-card-preview kims-card-preview"
        aria-hidden="true"
      >
        <div
          class="preview-card kims-preview-card preview-top-left preview-face-up"
        >
          <span>1</span>
        </div>

        <div
          class="preview-card kims-preview-card preview-top-right preview-face-up"
        >
          <span>2</span>
        </div>

        <div
          class="preview-card kims-preview-card preview-bottom-left preview-face-up"
        >
          <span>3</span>
        </div>

        <div
          class="preview-card kims-preview-card preview-bottom-right preview-face-down"
        ></div>
      </div>

      <h2>Kim’s Game</h2>
    </a>

    <a
      class="game-tile active card-table-tile pairs-tile"
      href="pages/pairs/settings.html"
      data-pairs-preview
    >
      <div
        class="tile-card-preview pairs-card-preview"
        aria-hidden="true"
      >
        <div
          class="preview-card pairs-preview-card preview-top-left"
          data-pairs-card
        >
          <div class="preview-card-inner">
            <div
              class="preview-card-side preview-card-back"
            ></div>

            <div
              class="preview-card-side preview-card-front"
            >
              <span data-pair-value></span>
            </div>
          </div>
        </div>

        <div
          class="preview-card pairs-preview-card preview-top-right"
          data-pairs-card
        >
          <div class="preview-card-inner">
            <div
              class="preview-card-side preview-card-back"
            ></div>

            <div
              class="preview-card-side preview-card-front"
            >
              <span data-pair-value></span>
            </div>
          </div>
        </div>

        <div
          class="preview-card pairs-preview-card preview-bottom-left"
          data-pairs-card
        >
          <div class="preview-card-inner">
            <div
              class="preview-card-side preview-card-back"
            ></div>

            <div
              class="preview-card-side preview-card-front"
            >
              <span data-pair-value></span>
            </div>
          </div>
        </div>

        <div
          class="preview-card pairs-preview-card preview-bottom-right"
          data-pairs-card
        >
          <div class="preview-card-inner">
            <div
              class="preview-card-side preview-card-back"
            ></div>

            <div
              class="preview-card-side preview-card-front"
            >
              <span data-pair-value></span>
            </div>
          </div>
        </div>
      </div>

      <h2>Pairs</h2>
    </a>

    <a
      class="game-tile active wheel-tile"
      href="pages/the-wheel/settings.html"
    >
      <div
        class="tile-wheel-preview"
        aria-hidden="true"
      >
        <div class="tile-wheel-disc"></div>
        <div class="tile-wheel-centre">SPIN</div>
        <div class="tile-wheel-pointer"></div>
      </div>

      <h2>The Wheel</h2>
    </a>

    <a
      class="game-tile active countdown-tile"
      href="pages/countdown/settings.html"
    >
      <div class="tile-countdown-preview" aria-hidden="true">
        <div class="tile-countdown-target">731</div>
        <div class="tile-countdown-numbers">
          <span>25</span><span>8</span><span>4</span><span>7</span><span>3</span><span>50</span>
        </div>
        <div class="tile-countdown-letters">
          <span>C</span><span>O</span><span>U</span><span>N</span><span>T</span>
        </div>
      </div>

      <h2>Countdown</h2>
    </a>

    <a
      class="game-tile active hotseat-tile"
      href="pages/hotseat/settings.html"
    >
      <div
        class="tile-hotseat-embers"
        aria-hidden="true"
      >
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
        <span class="tile-hotseat-ember"></span>
      </div>

      <h2>Hotseat</h2>
    </a>

    <a
      class="game-tile active codenames-tile"
      href="pages/codenames/settings.html"
    >
      <div class="tile-codenames-folder" aria-hidden="true">
        <span class="tile-codenames-tab">SECRET</span>
        <div class="tile-codenames-key">
          <span class="mini-agent mini-blue"></span>
          <span class="mini-agent mini-neutral"></span>
          <span class="mini-agent mini-red"></span>
          <span class="mini-agent mini-neutral"></span>
          <span class="mini-agent mini-black"></span>
          <span class="mini-agent mini-blue"></span>
          <span class="mini-agent mini-red"></span>
          <span class="mini-agent mini-neutral"></span>
          <span class="mini-agent mini-blue"></span>
        </div>
      </div>

      <h2>Codenames</h2>
    </a>

    <a
      class="game-tile active soundboard-tile"
      href="pages/soundboard/index.html"
    >
      <div
        class="tile-soundboard-preview"
        aria-hidden="true"
      >
        <div class="tile-soundboard-keys">
          <span>W</span>
          <span>D</span>
          <span>V</span>
          <span>A</span>
          <span>Y</span>
          <span>K</span>
        </div>

        <div class="tile-soundboard-levels">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
      </div>

      <h2>Soundboard</h2>
    </a>


    <a
      class="game-tile active timer-tile"
      href="pages/timer/settings.html"
    >
      <div class="tile-timer-preview" aria-hidden="true">
        <div class="tile-timer-ring">
          <span>01:00</span>
        </div>

        <div class="tile-timer-media">
          <span class="tile-timer-note">♪</span>
          <span class="tile-timer-spark">✦</span>
        </div>
      </div>

      <h2>Timer</h2>
    </a>

    <div class="game-tile coming-soon">
      <h2></h2>
    </div>

    <div class="game-tile coming-soon">
      <h2></h2>
    </div>
  </main>
</body>
</html>
